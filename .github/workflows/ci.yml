name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/intenthub?schema=public
      AUTH_SECRET: ci-test-secret-not-for-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx prisma validate

      - run: npm test

      - run: npm run build
