services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: intenthub
      POSTGRES_PASSWORD: intenthub
      POSTGRES_DB: intenthub
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
